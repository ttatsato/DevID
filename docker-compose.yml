services:
  postgres:
    image: postgres:16-alpine
    container_name: yokogushi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yokogushi
      POSTGRES_PASSWORD: yokogushi
      POSTGRES_DB: yokogushi
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yokogushi -d yokogushi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
